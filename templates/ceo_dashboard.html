{% extends "base.html" %}
{% block title %}AI CEO{% endblock %}
{% block content %}
<h2><i class="bi bi-robot"></i> AI CEO Dashboard</h2>

<div class="card mt-4">
    <div class="card-header bg-primary text-white"><h5>🤖 Your Contractor AI CEO</h5></div>
    <div class="card-body">
        <p>Your AI CEO analyzes your business and gives recommendations!</p>
        <button onclick="getAnalysis()" class="btn btn-primary">Get Business Analysis</button>
        <div id="analysis" class="mt-3"></div>
    </div>
</div>

<style>
.ai-response {
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow-wrap: break-word;
    max-width: 100%;
}
</style>

<script>
function getAnalysis() {
    document.getElementById('analysis').innerHTML = '<p>Analyzing...</p>';
    fetch('/api/ceo/analyze').then(r => r.json()).then(data => {
        document.getElementById('analysis').innerHTML = '<div class="alert alert-info ai-response">' + data.analysis + '</div>';
    });
}
</script>
{% endblock %}
